aid: confluence-unity
name: Confluence Unity
description: >-
  Confluence Unity is the unified fund administration and reporting platform
  from Confluence Technologies, a software provider focused on the global
  investment management industry. The Unity suite (including Unity Financial
  Reporting, Unity Performance, and Unity Rex for AI-driven reconciliation)
  consolidates data, regulatory and shareholder reporting, and performance
  analytics for asset managers, fund administrators, and asset servicers.
  Confluence operates Unity as a hosted SaaS platform with integrations into
  client data warehouses; the public site does not publish open developer API
  documentation, so developer access is typically arranged through Confluence
  account teams.
